services:
  - type: web
    name: raspisanie-bot
    runtime: docker
    dockerfilePath: ./bot/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: NOTIFY_SECRET
        sync: false
